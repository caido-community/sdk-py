projects:
  default:
    schema: ./schema.graphql
    documents: src/caido_sdk_client/graphql/documents/**.graphql
    extensions:
      turms:
        out_dir: src/caido_sdk_client/graphql/__generated__
        plugins:
          - type: turms.plugins.enums.EnumsPlugin
          - type: turms.plugins.inputs.InputsPlugin
            inputtype_bases:
              - 'caido_sdk_client.utils.pydantic.Model'
          - type: turms.plugins.fragments.FragmentsPlugin
          - type: turms.plugins.operations.OperationsPlugin
        object_bases:
          - 'caido_sdk_client.utils.pydantic.Model'
        scalar_definitions:
          DateTime: str
          Duration: int
          Blob: str
          Port: int
          Timestamp: int
          Snapshot: int
          Rank: str
          Token: str
          Url: str
          Upload: gql.FileVar
          JSON: dict
          JsonObject: dict
          Image: str
          Sensitive: str
          Uri: str
          Alias: str
          HTTPQL: str
          JsonRaw: str
          Version: str
          Binary: str
