name: Publish one
description: Action to publish one package

inputs:
  project-path:
    description: Path to the project to build and publish.
    required: true

  check-url:
    description: Simple index URL for uv --check-url (PEP 503, e.g. https://pypi.org/simple).
    required: false
    default: https://pypi.org/simple

runs:
  using: composite
  steps:
    - name: Build project
      shell: bash
      run: uv build "${{ inputs.project-path }}"

    - name: Publish project
      shell: bash
      run: |
        set -o pipefail

        status=0
        output=$(uv publish --project "${{ inputs.project-path }}" --check-url "${{ inputs.check-url }}" 2>&1) || status=$?

        echo "$output"

        if [ "$status" -ne 0 ]; then
          if echo "$output" | grep -qi "Local file and index file do not match"; then
            echo "This version is already on the index with a different artifact; treating as success."
            exit 0
          fi
          exit "$status"
        fi
